name: Get Unity activation file (.alf)

# Run this ONCE to obtain the activation file needed to create your Unity license secret.
# Steps:
#   1. Actions tab -> "Get Unity activation file (.alf)" -> Run workflow.
#   2. Download the "Manual Activation File" artifact and unzip it (a .alf file).
#   3. Go to https://license.unity3d.com/manual , upload the .alf, download the resulting .ulf.
#   4. Open the .ulf in a text editor, copy ALL of it, and save it as the repo secret UNITY_LICENSE.
on:
  workflow_dispatch: {}

jobs:
  activation:
    name: Request manual activation file
    runs-on: ubuntu-latest
    steps:
      - name: Request manual activation file
        id: getManualLicenseFile
        uses: game-ci/unity-request-activation-file@v2
      - name: Upload activation file
        uses: actions/upload-artifact@v4
        with:
          name: Manual Activation File
          path: ${{ steps.getManualLicenseFile.outputs.filePath }}
          retention-days: 2
