name: Build iOS IPA (unsigned)

# Compiles a Unity-generated iOS Xcode project into an UNSIGNED .ipa on a macOS runner.
# The Xcode project is too big for git (the UnityRuntime binary alone is >100 MB), so it is
# uploaded as a GitHub *Release asset* (ios-xcode.tar.gz) and downloaded here. No Unity license
# is needed in the cloud — Unity ran locally on your PC to produce the project.
on:
  workflow_dispatch:
    inputs:
      release_tag:
        description: 'Release tag that holds ios-xcode.tar.gz'
        default: 'ios-xcode-latest'
        required: true

jobs:
  build-ipa:
    name: Xcode → unsigned IPA
    runs-on: macos-14
    steps:
      - name: Download Xcode export from release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -e
          gh release download "${{ github.event.inputs.release_tag }}" -R "${{ github.repository }}" -p "ios-xcode.tar.gz"
          mkdir -p export
          tar -xzf ios-xcode.tar.gz -C export
          rm -f ios-xcode.tar.gz

      - name: Locate Xcode project
        id: find
        run: |
          set -e
          PROJ=$(find export -maxdepth 5 -name "Unity-iPhone.xcodeproj" | head -1)
          if [ -z "$PROJ" ]; then
            echo "::error::No Unity-iPhone.xcodeproj found in the release archive."
            find export -maxdepth 4 -type d | head -50
            exit 1
          fi
          echo "proj=$PROJ" >> "$GITHUB_OUTPUT"
          echo "dir=$(dirname "$PROJ")" >> "$GITHUB_OUTPUT"
          echo "Found $PROJ"

      - name: Build unsigned .app
        run: |
          set -e
          xcodebuild \
            -project "${{ steps.find.outputs.proj }}" \
            -scheme Unity-iPhone \
            -configuration Release \
            -sdk iphoneos \
            -derivedDataPath "${{ steps.find.outputs.dir }}/DerivedData" \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY="" \
            PROVISIONING_PROFILE="" \
            build

      - name: Package into .ipa
        run: |
          set -e
          APP=$(find "${{ steps.find.outputs.dir }}/DerivedData" -path "*Release-iphoneos/*.app" -maxdepth 6 | head -1)
          if [ -z "$APP" ]; then echo "::error::Built .app not found"; find . -name "*.app" -maxdepth 8; exit 1; fi
          echo "Packaging $APP"
          WORK=$(mktemp -d)
          mkdir -p "$WORK/Payload"
          cp -R "$APP" "$WORK/Payload/"
          mkdir -p out
          (cd "$WORK" && zip -qry ipa.zip Payload)
          mv "$WORK/ipa.zip" out/DartyBoy-unsigned.ipa
          ls -lh out

      - name: Upload IPA artifact
        uses: actions/upload-artifact@v4
        with:
          name: DartyBoy-ipa
          path: out/DartyBoy-unsigned.ipa
          retention-days: 7
